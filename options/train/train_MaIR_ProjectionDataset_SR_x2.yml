# ProjectionDataset super-resolution task: lr_clean -> hr_clean
name: train_MaIR_ProjectionDataset_SR_x2
model_type: MambaIRModel
scale: 2
num_gpu: 1
manual_seed: 10

datasets:
  train:
    name: ProjectionDataset_train_SR
    type: PairedImageDataset
    task: projection_raw
    dataroot_gt: "/root/autodl-tmp/MaIR/ProjectionDataset/train/hr_clean"
    dataroot_lq: "/root/autodl-tmp/MaIR/ProjectionDataset/train/lr_clean"
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 64
    use_hflip: true
    use_rot: true

    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ProjectionDataset_val_SR
    type: PairedImageDataset
    task: projection_raw
    dataroot_gt: "/root/autodl-tmp/MaIR/ProjectionDataset/val/hr_clean"
    dataroot_lq: "/root/autodl-tmp/MaIR/ProjectionDataset/val/lr_clean"
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: MaIR
  upscale: 2
  in_chans: 1
  img_range: 1
  d_state: 16
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  ssm_ratio: 1.3
  mlp_ratio: 2.0
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'
  img_size: 128
  dynamic_ids: false
  batch_size: 1
  scan_len: 4

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  ema_decay: 0
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [200000, 300000, 400000, 450000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1

  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: !!float 10e3
  val_freq_final: !!float 2e3
  val_milestone: 400000
  save_img: false
  metrics_on_raw: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 25e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
