name: train_MaIR_CT_SR_x2
model_type: MambaIRModel
scale: 2
num_gpu: 1
manual_seed: 10

datasets:
  train:
    name: CTSR_train
    type: PairedImageDataset
    task: ct_projection
    ct_min: 3958.0
    ct_max: 13987.0
    dataroot_gt: /root/autodl-tmp/MaIR/ProjectionDataset/train/hr_clean
    dataroot_lq: /root/autodl-tmp/MaIR/ProjectionDataset/train/lr_clean
    filename_tmpl: '{}'
    io_backend:
      type: disk
    gt_size: 64
    use_hflip: true
    use_rot: true
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: CTSR_val
    type: PairedImageDataset
    task: ct_projection
    ct_min: 3958.0
    ct_max: 13987.0
    dataroot_gt: /root/autodl-tmp/MaIR/ProjectionDataset/val/hr_clean
    dataroot_lq: /root/autodl-tmp/MaIR/ProjectionDataset/val/lr_clean
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: MaIR
  upscale: 2
  in_chans: 1
  img_range: 1.
  d_state: 16
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  ssm_ratio: 2.0
  mlp_ratio: 2.5
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'
  img_size: 64
  dynamic_ids: False
  batch_size: 1
  scan_len: 8

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: /root/autodl-tmp/MaIR/experiments/train_MaIR_CT_SR_x2/training_states/120000.state

train:
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5
  total_iter: 200000
  warmup_iter: -1
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: !!float 25e3
  val_freq_final: !!float 5e3
  val_milestone: 400000
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 2
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: false

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500